{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: bookmyevent-secrets
  namespace: {{ .Values.global.namespace }}
type: Opaque
stringData:
  # PostgreSQL credentials
  POSTGRES_USER: {{ .Values.database.postgres.user | quote }}
  POSTGRES_PASSWORD: {{ .Values.secrets.postgresPassword | quote }}
  # Database URLs
  USER_SERVICE_DB_URL: "postgresql://{{ .Values.database.postgres.user }}:{{ .Values.secrets.postgresPassword }}@postgres:5432/users_db?sslmode=disable"
  EVENT_SERVICE_DB_URL: "postgresql://{{ .Values.database.postgres.user }}:{{ .Values.secrets.postgresPassword }}@postgres:5432/events_db?sslmode=disable"
  BOOKING_SERVICE_DB_URL: "postgresql://{{ .Values.database.postgres.user }}:{{ .Values.secrets.postgresPassword }}@postgres:5432/bookings_db?sslmode=disable"
  # JWT Secret
  JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
  # Internal API Key for inter-service communication
  INTERNAL_API_KEY: {{ .Values.secrets.internalApiKey | quote }}
{{- end }}
