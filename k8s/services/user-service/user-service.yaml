---
# User Service Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: bookmyevent
  labels:
    app: user-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      enableServiceLinks: false
      containers:
        - name: user-service
          image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/bookmyevent/user-service:latest
          ports:
            - containerPort: 8001
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
          env:
            - name: USER_SERVICE_DB_URL
              valueFrom:
                secretKeyRef:
                  name: bookmyevent-secrets
                  key: USER_SERVICE_DB_URL
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: bookmyevent-config
                  key: REDIS_URL
            - name: ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: bookmyevent-config
                  key: ENVIRONMENT
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 30
          volumeMounts:
            - name: env-file
              mountPath: /root/.env
              subPath: .env
      volumes:
        - name: env-file
          configMap:
            name: env-file
---
# User Service Service
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: bookmyevent
spec:
  selector:
    app: user-service
  ports:
    - port: 8001
      targetPort: 8001
  type: ClusterIP

