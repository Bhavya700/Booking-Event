apiVersion: batch/v1
kind: Job
metadata:
  name: baseline-and-migrate
  namespace: bookmyevent
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: migrations
        image: postgres:15-alpine
        command:
          - sh
          - -c
          - |
            set -e
            
            echo "==================================================="
            echo "Setting Migration Baseline and Running New Migrations"
            echo "==================================================="
            
            # Install goose
            apk add --no-cache wget
            wget -O /tmp/goose https://github.com/pressly/goose/releases/download/v3.26.0/goose_linux_x86_64
            chmod +x /tmp/goose
            
            # User Service - Mark existing migrations as applied
            echo ""
            echo "User Service - Setting baseline..."
            echo "------------------------------------"
            cd /migrations/user-service
            
            # Check what tables exist
            echo "Checking existing tables in users_db..."
            psql "$USER_SERVICE_DB_URL" -c "\dt"
            
            # Mark migrations 1 and 2 as completed if users table exists
            if psql "$USER_SERVICE_DB_URL" -c "\dt users" | grep -q users; then
              echo "Users table exists, marking migration 00001 as completed..."
              /tmp/goose postgres "$USER_SERVICE_DB_URL" version || /tmp/goose postgres "$USER_SERVICE_DB_URL" create_version_table
              /tmp/goose postgres "$USER_SERVICE_DB_URL" up-to 1 || echo "Migration 1 already applied or failed"
            fi
            
            if psql "$USER_SERVICE_DB_URL" -c "\dt refresh_tokens" | grep -q refresh_tokens; then
              echo "Refresh tokens table exists, marking migration 00002 as completed..."
              /tmp/goose postgres "$USER_SERVICE_DB_URL" up-to 2 || echo "Migration 2 already applied or failed"
            fi
            
            # Run any remaining migrations
            echo "Running remaining user service migrations..."
            /tmp/goose postgres "$USER_SERVICE_DB_URL" up
            
            # Event Service - Mark existing migrations as applied and run admin migration
            echo ""
            echo "Event Service - Setting baseline..."
            echo "------------------------------------"
            cd /migrations/event-service
            
            echo "Checking existing tables in events_db..."
            psql "$EVENT_SERVICE_DB_URL" -c "\dt"
            
            # Mark migrations for existing tables
            /tmp/goose postgres "$EVENT_SERVICE_DB_URL" version || /tmp/goose postgres "$EVENT_SERVICE_DB_URL" create_version_table
            
            if psql "$EVENT_SERVICE_DB_URL" -c "\dt venues" | grep -q venues; then
              echo "Venues table exists, marking migration 00001 as completed..."
              /tmp/goose postgres "$EVENT_SERVICE_DB_URL" up-to 1 || echo "Migration 1 already applied or failed"
            fi
            
            if psql "$EVENT_SERVICE_DB_URL" -c "\dt events" | grep -q events; then
              echo "Events table exists, marking migration 00002 as completed..."
              /tmp/goose postgres "$EVENT_SERVICE_DB_URL" up-to 2 || echo "Migration 2 already applied or failed"
            fi
            
            # Now run migration 3 (admin table) and beyond
            echo ""
            echo "⚡ Running admin table migration (00003) and beyond..."
            /tmp/goose postgres "$EVENT_SERVICE_DB_URL" up
            
            # Verify admin table was created
            echo ""
            echo "Verifying admin table..."
            if psql "$EVENT_SERVICE_DB_URL" -c "\dt admins" | grep -q admins; then
              echo "✅ Admin table created successfully!"
              psql "$EVENT_SERVICE_DB_URL" -c "\d admins"
            else
              echo "❌ Admin table was not created"
            fi
            
            # Booking Service
            echo ""
            echo "Booking Service - Setting baseline..."
            echo "------------------------------------"
            cd /migrations/booking-service
            
            echo "Checking existing tables in bookings_db..."
            psql "$BOOKING_SERVICE_DB_URL" -c "\dt"
            
            /tmp/goose postgres "$BOOKING_SERVICE_DB_URL" version || /tmp/goose postgres "$BOOKING_SERVICE_DB_URL" create_version_table
            
            if psql "$BOOKING_SERVICE_DB_URL" -c "\dt bookings" | grep -q bookings; then
              echo "Bookings table exists, marking migrations as completed..."
              /tmp/goose postgres "$BOOKING_SERVICE_DB_URL" up-to 1 || echo "Migration already applied or failed"
            fi
            
            echo "Running remaining booking service migrations..."
            /tmp/goose postgres "$BOOKING_SERVICE_DB_URL" up
            
            echo ""
            echo "==================================================="
            echo "✅ All migrations completed!"
            echo "==================================================="
        envFrom:
          - secretRef:
              name: bookmyevent-secrets
        volumeMounts:
          - name: user-migrations
            mountPath: /migrations/user-service
          - name: event-migrations
            mountPath: /migrations/event-service
          - name: booking-migrations
            mountPath: /migrations/booking-service
      volumes:
        - name: user-migrations
          configMap:
            name: user-service-migrations
        - name: event-migrations
          configMap:
            name: event-service-migrations
        - name: booking-migrations
          configMap:
            name: booking-service-migrations
