
---
# Database Migration Job - Creates all tables with correct schema
apiVersion: batch/v1
kind: Job
metadata:
  name: db-migrations
  namespace: bookmyevent
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: db-migrations
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z postgres 5432; do echo waiting for postgres; sleep 2; done;']
      containers:
        - name: migrations
          image: postgres:15-alpine
          command:
            - /bin/sh
            - -c
            - |
              echo "=========================================="
              echo "Running BookMyEvent Database Migrations"
              echo "=========================================="
              
              # Users DB Migrations
              echo ""
              echo ">>> Migrating Users Database..."
              PGPASSWORD=postgres psql -h postgres -U postgres -d users_db << 'EOF'
              
              -- Users table
              CREATE TABLE IF NOT EXISTS users (
                  user_id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
                  email VARCHAR(255) UNIQUE NOT NULL,
                  phone_number VARCHAR(20),
                  name VARCHAR(255) NOT NULL,
                  password_hash VARCHAR(255) NOT NULL,
                  is_active BOOLEAN DEFAULT true,
                  created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
                  updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
              );
              
              -- Refresh tokens table
              CREATE TABLE IF NOT EXISTS refresh_tokens (
                  token TEXT PRIMARY KEY,
                  user_id UUID NOT NULL REFERENCES users(user_id) ON DELETE CASCADE,
                  expires_at TIMESTAMP NOT NULL,
                  revoked_at TIMESTAMP,
                  created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
                  updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
              );
              
              -- Indexes
              CREATE INDEX IF NOT EXISTS idx_users_email ON users(email);
              CREATE INDEX IF NOT EXISTS idx_refresh_tokens_user_id ON refresh_tokens(user_id);
              
              EOF
              echo "Users DB migration complete!"
              
              # Events DB Migrations
              echo ""
              echo ">>> Migrating Events Database..."
              PGPASSWORD=postgres psql -h postgres -U postgres -d events_db << 'EOF'
              
              -- Admins table
              CREATE TABLE IF NOT EXISTS admins (
                  admin_id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
                  email VARCHAR(255) UNIQUE NOT NULL,
                  name VARCHAR(255) NOT NULL,
                  phone_number VARCHAR(20),
                  password_hash VARCHAR(255) NOT NULL,
                  role VARCHAR(50) DEFAULT 'event_manager' CHECK (role IN ('super_admin', 'event_manager', 'analyst')),
                  permissions JSONB DEFAULT '{}',
                  is_active BOOLEAN DEFAULT true,
                  created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
                  updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
              );
              
              -- Admin refresh tokens
              CREATE TABLE IF NOT EXISTS admin_refresh_tokens (
                  token TEXT PRIMARY KEY,
                  admin_id UUID NOT NULL REFERENCES admins(admin_id) ON DELETE CASCADE,
                  expires_at TIMESTAMP NOT NULL,
                  revoked_at TIMESTAMP,
                  created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
                  updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
              );
              
              -- Venues table
              CREATE TABLE IF NOT EXISTS venues (
                  venue_id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
                  name VARCHAR(255) NOT NULL,
                  address TEXT NOT NULL,
                  city VARCHAR(100) NOT NULL,
                  state VARCHAR(100),
                  country VARCHAR(100) NOT NULL DEFAULT 'USA',
                  postal_code VARCHAR(20),
                  capacity INTEGER NOT NULL CHECK (capacity > 0),
                  layout_config JSONB DEFAULT '{}',
                  created_by UUID REFERENCES admins(admin_id),
                  created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
                  updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
              );
              
              -- Events table
              CREATE TABLE IF NOT EXISTS events (
                  event_id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
                  name VARCHAR(255) NOT NULL,
                  description TEXT,
                  venue_id UUID NOT NULL REFERENCES venues(venue_id),
                  event_type VARCHAR(50) NOT NULL,
                  start_datetime TIMESTAMP NOT NULL,
                  end_datetime TIMESTAMP NOT NULL,
                  total_capacity INTEGER NOT NULL CHECK (total_capacity > 0),
                  available_seats INTEGER NOT NULL CHECK (available_seats >= 0),
                  base_price DECIMAL(10, 2) NOT NULL CHECK (base_price >= 0),
                  max_tickets_per_booking INTEGER DEFAULT 10 CHECK (max_tickets_per_booking > 0),
                  status VARCHAR(20) DEFAULT 'draft' CHECK (status IN ('draft', 'published', 'sold_out', 'cancelled')),
                  version INTEGER DEFAULT 1 NOT NULL,
                  created_by UUID REFERENCES admins(admin_id),
                  created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
                  updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
                  CONSTRAINT check_seats_capacity CHECK (available_seats <= total_capacity),
                  CONSTRAINT check_dates CHECK (end_datetime > start_datetime)
              );
              
              -- Indexes
              CREATE INDEX IF NOT EXISTS idx_events_status ON events(status);
              CREATE INDEX IF NOT EXISTS idx_events_venue ON events(venue_id);
              CREATE INDEX IF NOT EXISTS idx_events_datetime ON events(start_datetime);
              
              EOF
              echo "Events DB migration complete!"
              
              # Bookings DB Migrations
              echo ""
              echo ">>> Migrating Bookings Database..."
              PGPASSWORD=postgres psql -h postgres -U postgres -d bookings_db << 'EOF'
              
              -- Bookings table
              CREATE TABLE IF NOT EXISTS bookings (
                  booking_id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
                  user_id UUID NOT NULL,
                  event_id UUID NOT NULL,
                  booking_reference VARCHAR(20) UNIQUE NOT NULL,
                  quantity INTEGER NOT NULL,
                  total_amount DECIMAL(10, 2) NOT NULL,
                  status VARCHAR(20) NOT NULL DEFAULT 'pending',
                  payment_status VARCHAR(20) NOT NULL DEFAULT 'pending',
                  idempotency_key VARCHAR(255) UNIQUE,
                  booked_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
                  expires_at TIMESTAMP,
                  confirmed_at TIMESTAMP,
                  cancelled_at TIMESTAMP,
                  created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
                  updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
                  CONSTRAINT check_quantity CHECK (quantity > 0),
                  CONSTRAINT check_total_amount CHECK (total_amount >= 0),
                  CONSTRAINT check_status CHECK (status IN ('pending', 'confirmed', 'cancelled', 'expired')),
                  CONSTRAINT check_payment_status CHECK (payment_status IN ('pending', 'completed', 'failed', 'refunded'))
              );
              
              -- Payments table
              CREATE TABLE IF NOT EXISTS payments (
                  payment_id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
                  booking_id UUID NOT NULL REFERENCES bookings(booking_id) ON DELETE CASCADE,
                  user_id UUID NOT NULL,
                  event_id UUID NOT NULL,
                  amount DECIMAL(10, 2) NOT NULL,
                  currency VARCHAR(3) DEFAULT 'USD',
                  payment_method VARCHAR(50),
                  payment_gateway VARCHAR(50),
                  gateway_transaction_id VARCHAR(255),
                  status VARCHAR(20) NOT NULL DEFAULT 'initiated',
                  ticket_url TEXT,
                  initiated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
                  completed_at TIMESTAMP,
                  failed_at TIMESTAMP,
                  error_message TEXT,
                  created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
                  updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
                  CONSTRAINT check_amount CHECK (amount >= 0),
                  CONSTRAINT check_payment_status CHECK (status IN ('initiated', 'processing', 'completed', 'failed')),
                  CONSTRAINT check_currency CHECK (currency IN ('USD', 'EUR', 'GBP', 'INR'))
              );
              
              -- Waitlist table
              CREATE TABLE IF NOT EXISTS waitlist (
                  waitlist_id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
                  event_id UUID NOT NULL,
                  user_id UUID NOT NULL,
                  position INTEGER NOT NULL,
                  quantity_requested INTEGER NOT NULL,
                  status VARCHAR(20) DEFAULT 'waiting',
                  joined_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
                  offered_at TIMESTAMP,
                  expires_at TIMESTAMP,
                  converted_at TIMESTAMP,
                  created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
                  updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
                  CONSTRAINT unique_user_event UNIQUE(user_id, event_id),
                  CONSTRAINT check_quantity_requested CHECK (quantity_requested > 0),
                  CONSTRAINT check_position CHECK (position > 0),
                  CONSTRAINT check_waitlist_status CHECK (status IN ('waiting', 'offered', 'expired', 'converted'))
              );
              
              -- Indexes
              CREATE INDEX IF NOT EXISTS idx_bookings_user ON bookings(user_id, status);
              CREATE INDEX IF NOT EXISTS idx_bookings_event ON bookings(event_id, status);
              CREATE INDEX IF NOT EXISTS idx_bookings_reference ON bookings(booking_reference);
              CREATE INDEX IF NOT EXISTS idx_bookings_status ON bookings(status);
              CREATE INDEX IF NOT EXISTS idx_bookings_expires_at ON bookings(expires_at) WHERE expires_at IS NOT NULL;
              CREATE INDEX IF NOT EXISTS idx_payments_booking ON payments(booking_id);
              CREATE INDEX IF NOT EXISTS idx_waitlist_event ON waitlist(event_id, status);
              
              EOF
              echo "Bookings DB migration complete!"
              
              echo ""
              echo "=========================================="
              echo "All migrations completed successfully!"
              echo "=========================================="
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
