---
# External Secrets Operator Deployment
# This operator syncs secrets from AWS Secrets Manager to Kubernetes
apiVersion: apps/v1
kind: Deployment
metadata:
  name: external-secrets
  namespace: bookmyevent
  labels:
    app: external-secrets
spec:
  replicas: 1
  selector:
    matchLabels:
      app: external-secrets
  template:
    metadata:
      labels:
        app: external-secrets
    spec:
      serviceAccountName: external-secrets-sa
      containers:
        - name: external-secrets
          image: ghcr.io/external-secrets/external-secrets:v0.9.11
          args:
            - --concurrent=1
            - --metrics-addr=:8080
          ports:
            - containerPort: 8080
              name: metrics
          env:
            - name: AWS_REGION
              value: "us-east-1"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
---
# Service for metrics
apiVersion: v1
kind: Service
metadata:
  name: external-secrets
  namespace: bookmyevent
spec:
  selector:
    app: external-secrets
  ports:
    - port: 8080
      targetPort: 8080
      name: metrics
  type: ClusterIP
