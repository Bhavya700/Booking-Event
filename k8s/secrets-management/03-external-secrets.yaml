---
# ExternalSecret for Database Credentials
# Syncs PostgreSQL credentials from AWS Secrets Manager
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: database-credentials
  namespace: bookmyevent
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: bookmyevent-secrets
    creationPolicy: Owner
  data:
    - secretKey: POSTGRES_USER
      remoteRef:
        key: bookmyevent/database
        property: username
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: bookmyevent/database
        property: password
    - secretKey: USER_SERVICE_DB_URL
      remoteRef:
        key: bookmyevent/database
        property: user_service_db_url
    - secretKey: EVENT_SERVICE_DB_URL
      remoteRef:
        key: bookmyevent/database
        property: event_service_db_url
    - secretKey: BOOKING_SERVICE_DB_URL
      remoteRef:
        key: bookmyevent/database
        property: booking_service_db_url
---
# ExternalSecret for Application Secrets
# Syncs JWT and API keys from AWS Secrets Manager
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: application-secrets
  namespace: bookmyevent
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: bookmyevent-app-secrets
    creationPolicy: Owner
  data:
    - secretKey: JWT_SECRET
      remoteRef:
        key: bookmyevent/application
        property: jwt_secret
    - secretKey: INTERNAL_API_KEY
      remoteRef:
        key: bookmyevent/application
        property: internal_api_key
