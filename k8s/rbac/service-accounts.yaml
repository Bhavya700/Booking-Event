---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: bookmyevent-backend-sa
  namespace: bookmyevent
  annotations:
    description: "Service account for backend microservices"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: bookmyevent-frontend-sa
  namespace: bookmyevent
  annotations:
    description: "Service account for frontend application"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: bookmyevent-backend-role
  namespace: bookmyevent
rules:
# Allow reading ConfigMaps for configuration
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list"]
# Allow reading Secrets for credentials
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]
# Allow reading Services for service discovery
- apiGroups: [""]
  resources: ["services"]
  verbs: ["get", "list"]
# Allow reading own pod information
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: bookmyevent-frontend-role
  namespace: bookmyevent
rules:
# Minimal permissions for frontend
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get"]
- apiGroups: [""]
  resources: ["services"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: bookmyevent-backend-binding
  namespace: bookmyevent
subjects:
- kind: ServiceAccount
  name: bookmyevent-backend-sa
  namespace: bookmyevent
roleRef:
  kind: Role
  name: bookmyevent-backend-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: bookmyevent-frontend-binding
  namespace: bookmyevent
subjects:
- kind: ServiceAccount
  name: bookmyevent-frontend-sa
  namespace: bookmyevent
roleRef:
  kind: Role
  name: bookmyevent-frontend-role
  apiGroup: rbac.authorization.k8s.io
