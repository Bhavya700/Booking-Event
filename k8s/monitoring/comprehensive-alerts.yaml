apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: bookmyevent-alerts
  namespace: monitoring
  labels:
    app: bookmyevent
    prometheus: kube-prometheus
    release: monitoring
spec:
  groups:
    # Application-level alerts
    - name: bookmyevent.application.rules
      interval: 30s
      rules:
        # High error rate across all services
        - alert: HighApplicationErrorRate
          expr: |
            sum(rate(http_requests_total{namespace="bookmyevent",status=~"5.."}[5m]))
            /
            sum(rate(http_requests_total{namespace="bookmyevent"}[5m])) > 0.05
          for: 5m
          labels:
            severity: warning
            component: application
          annotations:
            summary: "High error rate detected in BookMyEvent"
            description: "More than 5% of requests are returning 5xx errors (current: {{ $value | humanizePercentage }})"
            runbook: "Check service logs and pod status"

        # Service down
        - alert: ServiceDown
          expr: up{namespace="bookmyevent"} == 0
          for: 2m
          labels:
            severity: critical
            component: availability
          annotations:
            summary: "Service {{ $labels.job }} is down"
            description: "Service {{ $labels.job }} in namespace {{ $labels.namespace }} has been down for more than 2 minutes"
            runbook: "kubectl get pods -n bookmyevent -l app={{ $labels.app }}"

        # High response time
        - alert: HighResponseTime
          expr: |
            histogram_quantile(0.95,
              sum(rate(http_request_duration_seconds_bucket{namespace="bookmyevent"}[5m])) by (le, app)
            ) > 1
          for: 5m
          labels:
            severity: warning
            component: performance
          annotations:
            summary: "High response time for {{ $labels.app }}"
            description: "95th percentile response time is above 1s (current: {{ $value }}s)"

    # Resource utilization alerts
    - name: bookmyevent.resources.rules
      interval: 30s
      rules:
        # High CPU usage
        - alert: HighCPUUsage
          expr: |
            sum(rate(container_cpu_usage_seconds_total{namespace="bookmyevent",container!=""}[5m])) by (pod)
            /
            sum(container_spec_cpu_quota{namespace="bookmyevent",container!=""}/container_spec_cpu_period{namespace="bookmyevent",container!=""}) by (pod) > 0.8
          for: 10m
          labels:
            severity: warning
            component: resources
          annotations:
            summary: "High CPU usage in pod {{ $labels.pod }}"
            description: "CPU usage is above 80% (current: {{ $value | humanizePercentage }})"
            runbook: "Consider scaling up replicas or increasing resource limits"

        # High memory usage
        - alert: HighMemoryUsage
          expr: |
            sum(container_memory_working_set_bytes{namespace="bookmyevent",container!=""}) by (pod)
            /
            sum(container_spec_memory_limit_bytes{namespace="bookmyevent",container!=""}) by (pod) > 0.85
          for: 5m
          labels:
            severity: warning
            component: resources
          annotations:
            summary: "High memory usage in pod {{ $labels.pod }}"
            description: "Memory usage is above 85% (current: {{ $value | humanizePercentage }})"
            runbook: "Check for memory leaks or increase memory limits"

        # Pod restart loop
        - alert: PodCrashLooping
          expr: rate(kube_pod_container_status_restarts_total{namespace="bookmyevent"}[15m]) > 0
          for: 5m
          labels:
            severity: critical
            component: stability
          annotations:
            summary: "Pod {{ $labels.pod }} is crash looping"
            description: "Pod has restarted {{ $value }} times in the last 15 minutes"
            runbook: "kubectl logs {{ $labels.pod }} -n bookmyevent --previous"

    # Database and infrastructure alerts
    - name: bookmyevent.infrastructure.rules
      interval: 30s
      rules:
        # Redis down
        - alert: RedisDown
          expr: up{app="redis",namespace="bookmyevent"} == 0
          for: 2m
          labels:
            severity: critical
            component: infrastructure
          annotations:
            summary: "Redis is down"
            description: "Redis cache is unavailable, may impact booking reservations"
            runbook: "kubectl get pods -n bookmyevent -l app=redis"

        # Elasticsearch down
        - alert: ElasticsearchDown
          expr: up{app="elasticsearch",namespace="bookmyevent"} == 0
          for: 2m
          labels:
            severity: warning
            component: infrastructure
          annotations:
            summary: "Elasticsearch is down"
            description: "Search functionality may be impaired"
            runbook: "kubectl get pods -n bookmyevent -l app=elasticsearch"

        # High Redis memory
        - alert: RedisHighMemory
          expr: |
            redis_memory_used_bytes{namespace="bookmyevent"}
            /
            redis_memory_max_bytes{namespace="bookmyevent"} > 0.9
          for: 5m
          labels:
            severity: warning
            component: infrastructure
          annotations:
            summary: "Redis memory usage high"
            description: "Redis is using {{ $value | humanizePercentage }} of max memory"

    # Business logic alerts
    - name: bookmyevent.business.rules
      interval: 60s
      rules:
        # High booking failure rate
        - alert: HighBookingFailureRate
          expr: |
            sum(rate(http_requests_total{app="booking-service",status!~"2.."}[10m]))
            /
            sum(rate(http_requests_total{app="booking-service"}[10m])) > 0.1
          for: 10m
          labels:
            severity: critical
            component: business
          annotations:
            summary: "High booking failure rate"
            description: "More than 10% of booking requests are failing"
            runbook: "Check RDS connectivity and booking service logs"

        # No bookings in 30 minutes (business hours)
        - alert: NoBookingsDetected
          expr: |
            sum(increase(http_requests_total{app="booking-service",endpoint="/bookings/confirm"}[30m])) == 0
          for: 30m
          labels:
            severity: info
            component: business
          annotations:
            summary: "No bookings in last 30 minutes"
            description: "May indicate issue with booking flow or low traffic"
