apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: booking-service-monitor
  namespace: monitoring
spec:
  namespaceSelector:
    matchNames:
      - bookmyevent
  selector:
    matchLabels:
      app: booking-service          
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
      scheme: http
