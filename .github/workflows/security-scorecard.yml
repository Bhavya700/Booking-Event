name: OSSF Scorecard Security Analysis

on:
  # Disabled for private repos - OSSF Scorecard requires public repo or GitHub App
  # branch_protection_rule:
  # schedule:
  #   - cron: '0 0 * * 0'
  workflow_dispatch:
  # push:
  #   branches: [ main ]

permissions: read-all

jobs:
  analysis:
    name: OSSF Scorecard Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read
      issues: read
      pull-requests: read
      checks: read
      repository-projects: read
      statuses: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run OSSF Scorecard
        uses: ossf/scorecard-action@v2.4.0
        continue-on-error: true
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: false

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload SARIF results to code scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
          category: ossf-scorecard

      - name: Generate summary
        if: always()
        run: |
          echo "## OSSF Scorecard Analysis Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Security scorecard results have been uploaded to the Security tab." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo " View results: [Security > Code scanning alerts](https://github.com/${{ github.repository }}/security/code-scanning)" >> $GITHUB_STEP_SUMMARY
